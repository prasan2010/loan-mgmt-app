<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanSphere — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0a1628;
            --gold: #c9a84c;
            --gold-light: #e8c87a;
            --cream: #f8f4ee;
            --text: #1a2540;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #0a1628 0%, #152040 50%, #0e1f3d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .brand {
            text-align: center;
            z-index: 1;
        }

        .brand-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: 0 20px 60px rgba(201,168,76,0.3);
        }

        .brand-name {
            font-family: 'DM Serif Display', serif;
            font-size: 42px;
            color: #fff;
            letter-spacing: -1px;
        }

        .brand-name span { color: var(--gold); }

        .brand-tagline {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 60px;
            z-index: 1;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            color: var(--gold);
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .right-panel {
            width: 480px;
            background: var(--cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 50px;
        }

        h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 34px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7a99;
            margin-bottom: 40px;
            font-size: 15px;
        }

        .alert-error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 10px;
            padding: 12px 16px;
            color: #c0392b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #5a6785;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e6f0;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--text);
            background: #fff;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--gold); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--navy), #1a2d52);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(10,22,40,0.3);
        }

        .credentials-hint {
            margin-top: 24px;
            padding: 16px;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            font-size: 13px;
            color: #7a6020;
        }

        .credentials-hint strong { display: block; margin-bottom: 4px; color: #5a4510; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="brand">
            <div class="brand-icon">🏦</div>
            <div class="brand-name">Loan<span>Sphere</span></div>
            <div class="brand-tagline">Loan Management Platform</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">₹500Cr+</div>
                <div class="stat-label">Disbursed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">12K+</div>
                <div class="stat-label">Active Loans</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">98.2%</div>
                <div class="stat-label">Recovery Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">6 Types</div>
                <div class="stat-label">Loan Products</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your officer dashboard</p>

        <div th:if="${param.error}" class="alert-error">
            ⚠ Invalid username or password. Please try again.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="credentials-hint">
            <strong>Demo Credentials</strong>
            Admin: admin / admin123<br>
            Officer: officer / officer123
        </div>
    </div>
</body>
</html>
